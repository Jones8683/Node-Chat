name: build-node-chat

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_call:
    secrets:
      VITE_FIREBASE_API_KEY:
        required: true
      VITE_FIREBASE_AUTH_DOMAIN:
        required: true
      VITE_FIREBASE_DATABASE_URL:
        required: true
      VITE_FIREBASE_PROJECT_ID:
        required: true
      VITE_FIREBASE_STORAGE_BUCKET:
        required: true
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        required: true
      VITE_FIREBASE_APP_ID:
        required: true
      VITE_GIPHY_KEY:
        required: true

concurrency:
  group: tauri-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-installer:
    name: build-node-chat
    runs-on: windows-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_GIPHY_KEY: ${{ secrets.VITE_GIPHY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Write .env.production for Vite build
        shell: pwsh
        run: |
          $lines = @(
            "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}",
            "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            "VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}",
            "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}",
            "VITE_GIPHY_KEY=${{ secrets.VITE_GIPHY_KEY }}"
          )
          $lines | Set-Content -Path .env.production -Encoding UTF8

      - name: Build Tauri installer (release)
        run: npm run tauri:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-chat-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
