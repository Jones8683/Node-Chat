name: build-node-chat

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  workflow_call:
    secrets:
      VITE_FIREBASE_API_KEY:
        required: true
      VITE_FIREBASE_AUTH_DOMAIN:
        required: true
      VITE_FIREBASE_DATABASE_URL:
        required: true
      VITE_FIREBASE_PROJECT_ID:
        required: true
      VITE_FIREBASE_STORAGE_BUCKET:
        required: true
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        required: true
      VITE_FIREBASE_APP_ID:
        required: true

concurrency:
  group: tauri-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-installer:
    name: build-node-chat
    runs-on: windows-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase env
        shell: pwsh
        run: |
          $required = @(
            'VITE_FIREBASE_API_KEY',
            'VITE_FIREBASE_AUTH_DOMAIN',
            'VITE_FIREBASE_DATABASE_URL',
            'VITE_FIREBASE_PROJECT_ID',
            'VITE_FIREBASE_STORAGE_BUCKET',
            'VITE_FIREBASE_MESSAGING_SENDER_ID',
            'VITE_FIREBASE_APP_ID'
          )

          $missing = @()
          foreach ($name in $required) {
            $val = (Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value
            $clean = if ($val) { $val.Trim().Trim('"').Trim("'") } else { $val }
            if ([string]::IsNullOrWhiteSpace($clean)) { $missing += $name }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required Firebase env values: $($missing -join ', '). Add them as GitHub Actions secrets named the same as the VITE_FIREBASE_* variables."
          }

      - name: CI Secret diagnostics
        shell: pwsh
        run: |
          $names = @(
            'VITE_FIREBASE_API_KEY',
            'VITE_FIREBASE_AUTH_DOMAIN',
            'VITE_FIREBASE_DATABASE_URL',
            'VITE_FIREBASE_PROJECT_ID',
            'VITE_FIREBASE_STORAGE_BUCKET',
            'VITE_FIREBASE_MESSAGING_SENDER_ID',
            'VITE_FIREBASE_APP_ID'
          )
          foreach ($n in $names) {
            $v = (Get-Item "Env:$n" -ErrorAction SilentlyContinue).Value
            if (-not $v) {
              Write-Output ("$($n): MISSING")
            } else {
              $len = $v.Length
              $hasNewline = ($v -match "`r" -or $v -match "`n")
              $trimmedLen = $v.Trim().Length
              $leadingOrTrailing = $trimmedLen -ne $len
              Write-Output ("$($n): length=$len, hasNewline=$hasNewline, leadingOrTrailingWhitespace=$leadingOrTrailing")
            }
          }

      - name: Write .env.production for Vite build
        shell: pwsh
        run: |
          $map = @{
            'VITE_FIREBASE_API_KEY' = $env:VITE_FIREBASE_API_KEY
            'VITE_FIREBASE_AUTH_DOMAIN' = $env:VITE_FIREBASE_AUTH_DOMAIN
            'VITE_FIREBASE_DATABASE_URL' = $env:VITE_FIREBASE_DATABASE_URL
            'VITE_FIREBASE_PROJECT_ID' = $env:VITE_FIREBASE_PROJECT_ID
            'VITE_FIREBASE_STORAGE_BUCKET' = $env:VITE_FIREBASE_STORAGE_BUCKET
            'VITE_FIREBASE_MESSAGING_SENDER_ID' = $env:VITE_FIREBASE_MESSAGING_SENDER_ID
            'VITE_FIREBASE_APP_ID' = $env:VITE_FIREBASE_APP_ID
          }

          $out = @()
          foreach ($k in $map.Keys) {
            $v = $map[$k]
            if ($null -eq $v) { $clean = '' } else { $clean = $v.Trim().Trim('"').Trim("'") }
            $out += "$($k)=$clean"
          }
          $out | Set-Content -Path .env.production -Encoding UTF8

      - name: Build Tauri installer (release)
        run: npm run tauri:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-chat-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
